<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINGO</title>
    <style>
        :root {
            --bg-top: #0a2cff;
            --bg-mid: #0b6dff;
            --bg-bot: #07b7ff;
            --panel: rgba(255, 255, 255, 0.12);
            --panel-strong: rgba(255, 255, 255, 0.18);
            --text-color: #ffffff;
            --muted: rgba(255, 255, 255, 0.8);

            --tile-bg: rgba(255, 255, 255, 0.12);
            --tile-border: rgba(255, 255, 255, 0.55);

            --correct: #26d07c;
            --present: #ffd400;
            --absent: rgba(0, 0, 0, 0.28);

            --accent: #ff7a00;
            --accent-2: #ffb000;

            --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: radial-gradient(1200px 700px at 20% 10%, rgba(255, 122, 0, 0.25), transparent 55%),
                        radial-gradient(900px 600px at 80% 20%, rgba(255, 176, 0, 0.18), transparent 60%),
                        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 45%, var(--bg-bot));
            color: var(--text-color);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.18), transparent 45%),
                radial-gradient(circle at 15% 60%, rgba(255, 255, 255, 0.10), transparent 45%),
                radial-gradient(circle at 85% 65%, rgba(255, 255, 255, 0.10), transparent 45%);
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* ===== MENU SCREENS ===== */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            padding: 16px;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        .screen.active { display: flex; }

        .menu-title {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 14px rgba(255, 255, 255, 0.35), 0 0 34px rgba(255, 122, 0, 0.35);
            margin-bottom: 4px;
        }
        .menu-title::after {
            content: "";
            display: block;
            height: 4px;
            width: min(280px, 80vw);
            margin: 8px auto 0;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), var(--accent), transparent);
            box-shadow: 0 0 18px rgba(255, 122, 0, 0.55);
        }

        .menu-btn {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.16));
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 14px;
            height: 52px;
            width: 100%;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 12px 24px rgba(0, 0, 0, 0.18);
            transition: transform 0.06s, background-color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover { background: linear-gradient(180deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.20)); }
        .menu-btn:active { transform: scale(0.97); }
        .menu-btn.coming-soon { opacity: 0.6; }
        .menu-btn.back-btn { font-size: 15px; opacity: 0.8; }

        /* ===== GAME SCREEN ===== */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            max-width: 420px;
            padding: 4px 8px;
            position: relative;
            z-index: 1;
        }
        #game-screen.active { display: flex; }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 2px 0;
            flex-shrink: 0;
        }
        .game-header .back-icon {
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            cursor: pointer;
            padding: 4px 8px;
            opacity: 0.8;
            flex-shrink: 0;
        }
        .game-header .back-icon:active { transform: scale(0.9); }
        .game-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 14px rgba(255, 255, 255, 0.35), 0 0 34px rgba(255, 122, 0, 0.35);
            flex-shrink: 0;
        }
        .game-stats {
            font-size: 12px;
            font-weight: 800;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 0 12px rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 10px;
            padding: 4px 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .game-subtitle {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            margin: 1px 0 2px 0;
            flex-shrink: 0;
        }

        /* Board fills available space between message and keyboard */
        #game-board {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            flex: 1;
            width: 100%;
            min-height: 0;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .cell {
            border: 2px solid var(--tile-border);
            background: var(--tile-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 6px 14px rgba(0, 0, 0, 0.18);
        }

        /* ===== Game Over Panel (centered overlay) ===== */
        #gameover-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 28px 36px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 32px);
            max-width: 320px;
            z-index: 100;
        }

        #gameover-panel .answer-text {
            font-weight: 900;
            font-size: 20px;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 14px rgba(0, 0, 0, 0.35);
        }

        #gameover-panel .answer-word {
            font-weight: 900;
            font-size: 32px;
            color: #ffd400;
            text-align: center;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 212, 0, 0.4);
        }

        #next-btn {
            background: linear-gradient(180deg, #ff7a00, #e06600);
            color: white;
            border: none;
            border-radius: 14px;
            height: 66px;
            padding: 0 40px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(255, 122, 0, 0.4);
            display: none;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
            animation: breathe 2.5s ease-in-out infinite;
        }
        #next-btn:hover { background: linear-gradient(180deg, #ff8c1a, #e06600); }
        #next-btn:active { transform: scale(0.95); }

        @keyframes breathe {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            padding: 8px;
            background: var(--panel-strong);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        button.key {
            background: linear-gradient(180deg, rgba(10, 44, 255, 0.55), rgba(7, 30, 180, 0.55));
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            height: 44px;
            min-width: 28px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 8px 18px rgba(0, 0, 0, 0.18);
            transition: transform 0.06s, background-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        button.key:hover { background: linear-gradient(180deg, rgba(10, 44, 255, 0.7), rgba(7, 30, 180, 0.7)); }
        button.key:active { transform: scale(0.95); }
        button.key.wide { flex: 1.6; font-size: 12px; }

        /* Color States */
        .correct {
            background: linear-gradient(180deg, rgba(38, 208, 124, 0.95), rgba(14, 149, 84, 0.95));
            border-color: rgba(255, 255, 255, 0.22);
        }
        .present {
            background: linear-gradient(180deg, rgba(255, 212, 0, 0.98), rgba(221, 168, 0, 0.98));
            border-color: rgba(255, 255, 255, 0.22);
            color: #1a1a1a;
        }
        .absent {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.18));
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* Responsive keyboard */
        @media (max-height: 700px) {
            .game-title { font-size: 22px; }
            .game-stats { font-size: 10px; padding: 3px 8px; }
            .game-subtitle { font-size: 11px; }
            #keyboard { gap: 4px; padding: 6px; }
            .key-row { gap: 4px; }
            button.key { height: 36px; font-size: 12px; }
            button.key.wide { font-size: 10px; }
        }

        @media (max-height: 600px) {
            .game-title { font-size: 18px; letter-spacing: 2px; }
            .game-stats { font-size: 9px; padding: 2px 6px; }
            .game-subtitle { font-size: 10px; }
            #keyboard { gap: 3px; padding: 4px; }
            .key-row { gap: 3px; }
            button.key { height: 30px; font-size: 10px; min-width: 22px; }
            button.key.wide { font-size: 9px; }
        }

        @media (max-width: 360px) {
            .menu-title { font-size: 36px; }
            .menu-btn { font-size: 15px; height: 46px; }
            .game-title { font-size: 22px; }
            button.key { height: 38px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- ===== MAIN MENU ===== -->
    <div id="main-menu" class="screen active">
        <div class="menu-title">LINGO</div>
        <button class="menu-btn" onclick="showScreen('single-menu')">SINGLE PLAYER</button>
        <button class="menu-btn coming-soon" onclick="showComingSoon()">MULTIPLAYER</button>
        <button class="menu-btn coming-soon" onclick="showComingSoon()">ΡΥΘΜΙΣΕΙΣ</button>
    </div>

    <!-- ===== SINGLE PLAYER MENU ===== -->
    <div id="single-menu" class="screen">
        <div class="menu-title" style="font-size:32px;">SINGLE</div>
        <button class="menu-btn" onclick="startGame(4)">4 ΓΡΑΜΜΑΤΑ</button>
        <button class="menu-btn coming-soon" onclick="showComingSoon()">5 ΓΡΑΜΜΑΤΑ</button>
        <button class="menu-btn coming-soon" onclick="showComingSoon()">6 ΓΡΑΜΜΑΤΑ</button>
        <button class="menu-btn back-btn" onclick="showScreen('main-menu')">← ΠΙΣΩ</button>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div id="game-screen">
        <div class="game-header">
            <button class="back-icon" onclick="backToMenu()">←</button>
            <span class="game-title">LINGO</span>
            <span class="game-stats" id="stats">Νίκες: 0 | Ήττες: 0</span>
        </div>
        <div class="game-subtitle" id="game-subtitle">Βρες την λέξη με τα 4 γράμματα!</div>
        <div id="game-board"></div>
        <div id="gameover-panel">
            <div class="answer-text">Η λέξη ήταν</div>
            <div class="answer-word" id="answer-word"></div>
            <button id="next-btn">ΕΠΟΜΕΝΟ</button>
        </div>
        <div id="keyboard"></div>
    </div>

    <script>
        // ---- Screens ----
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('game-screen').classList.remove('active');
        }

        function showComingSoon() {
            // no message needed anymore
        }

        function backToMenu() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('main-menu').classList.add('active');
            document.removeEventListener('keydown', handlePhysicalKeyboard);
            clearTimer();
            hideGameOverPanel();
        }

        // ---- Game Data ----
        let targetWords = [];
        let dictionary = [];
        let wordLength = 4;
        const maxGuesses = 6;

        const STATS_KEY = 'greekLingoStats_v1';
        let stats = { wins: 0, losses: 0 };

        // ---- Timer ----
        const TIMER_SECONDS = 15;
        let timerInterval = null;
        let timerSeconds = TIMER_SECONDS;

        function startTimer() {
            clearTimer();
            timerSeconds = TIMER_SECONDS;
            updateTimerUI();
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerUI();
                if (timerSeconds <= 0) {
                    clearTimer();
                    handleLoss("Τέλος χρόνου! Έχασες!");
                }
            }, 1000);
        }

        function clearTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerUI() {
            const el = document.getElementById('stats');
            if (el) el.textContent = `Νίκες: ${stats.wins} | Ήττες: ${stats.losses} | ⏱ ${timerSeconds}s`;
        }

        function loadStats() {
            try {
                const raw = localStorage.getItem(STATS_KEY);
                if (!raw) return;
                const parsed = JSON.parse(raw);
                if (typeof parsed?.wins === 'number' && typeof parsed?.losses === 'number') {
                    stats = { wins: parsed.wins, losses: parsed.losses };
                }
            } catch (_) {}
        }

        function saveStats() {
            try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch (_) {}
        }

        function updateStatsUI() {
            const el = document.getElementById('stats');
            if (el) el.textContent = `Νίκες: ${stats.wins} | Ήττες: ${stats.losses} | ⏱ ${timerSeconds}s`;
        }

        async function loadWordData() {
            const res = await fetch('./dictionary.json', { cache: 'no-store' });
            if (!res.ok) throw new Error('Failed to load dictionary.json');
            const data = await res.json();
            if (data.wordLength !== wordLength) {
                throw new Error(`dictionary.json wordLength (${data.wordLength}) does not match game (${wordLength})`);
            }
            targetWords = Array.isArray(data.targetWords) ? data.targetWords : [];
            dictionary = Array.isArray(data.dictionary) ? data.dictionary : [];
            targetWords = targetWords.map(w => String(w).trim().toUpperCase());
            dictionary = dictionary.map(w => String(w).trim().toUpperCase());
            if (targetWords.length < 1 || dictionary.length < 1) {
                throw new Error('dictionary.json is missing targetWords/dictionary entries');
            }
        }

        // ---- Game State ----
        let targetWord = "";
        let currentRow = 0;
        let currentGuess = "";
        let gameOver = false;
        let guessedWords = []; // track guessed words to detect duplicates
        let currentWordIndex = 0; // track which word we're on in the session
        let sessionWords = []; // words used in this session
        let sessionLosses = 0; // losses in current session
        let sessionWins = 0; // wins in current session

        function computeCellSize() {
            const screen = document.getElementById('game-screen');
            const header = screen.querySelector('.game-header');
            const subtitle = screen.querySelector('.game-subtitle');
            const kb = document.getElementById('keyboard');

            const availHeight = screen.clientHeight;
            const headerH = header.offsetHeight;
            const subH = subtitle.offsetHeight;
            const msgH = 0;
            const kbH = kb.offsetHeight;

            // Gaps: header->subtitle, subtitle->board, board->keyboard
            const gaps = 4 + 2 + 6; // approximate total gaps in px
            const boardGap = 5; // gap between rows
            const cellGap = 5; // gap between cells in a row

            const boardAvail = availHeight - headerH - subH - msgH - kbH - gaps;
            // board has maxGuesses rows with boardGap between them
            const rowH = (boardAvail - (maxGuesses - 1) * boardGap) / maxGuesses;
            // cell width = rowH (square), but also constrained by screen width
            const maxWidth = screen.clientWidth - 16; // 8px padding each side
            const cellW = (maxWidth - (wordLength - 1) * cellGap) / wordLength;

            const size = Math.min(rowH, cellW);
            return Math.max(size, 20); // minimum 20px
        }

        function applyCellSizes() {
            const size = computeCellSize();
            const fontSize = Math.max(size * 0.5, 12);
            document.querySelectorAll('.cell').forEach(cell => {
                cell.style.width = size + 'px';
                cell.style.height = size + 'px';
                cell.style.fontSize = fontSize + 'px';
            });
        }

        function showGameOverPanel(word) {
            const panel = document.getElementById('gameover-panel');
            const wordEl = document.getElementById('answer-word');
            wordEl.textContent = word;
            panel.style.display = 'flex';
            const btn = document.getElementById('next-btn');
            btn.style.display = 'inline-flex';
        }

        function hideGameOverPanel() {
            const panel = document.getElementById('gameover-panel');
            panel.style.display = 'none';
            const btn = document.getElementById('next-btn');
            btn.style.display = 'none';
        }

        function nextWord() {
            // Pick a new random word that hasn't been used in this session
            let available = targetWords.filter(w => !sessionWords.includes(w));
            if (available.length === 0) {
                // All words used, reset session
                sessionWords = [];
                available = targetWords;
            }
            const newWord = available[Math.floor(Math.random() * available.length)];
            sessionWords.push(newWord);

            // Reset game state
            targetWord = newWord;
            currentRow = 0;
            currentGuess = "";
            gameOver = false;
            guessedWords = [];

            // Clear the board
            document.getElementById('game-board').innerHTML = '';
            document.getElementById('keyboard').innerHTML = '';

            hideGameOverPanel();

            createBoard();
            createKeyboard();

            requestAnimationFrame(() => {
                applyCellSizes();
            });

            currentGuess = targetWord.charAt(0);
            updateBoard();

            startTimer();

            document.addEventListener('keydown', handlePhysicalKeyboard);
        }

        // Wire up the next button
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('next-btn').addEventListener('click', nextWord);
        });

        async function startGame(len) {
            wordLength = len;
            targetWord = "";
            currentRow = 0;
            currentGuess = "";
            gameOver = false;
            guessedWords = [];
            sessionWords = [];
            sessionLosses = 0;
            sessionWins = 0;

            loadStats();
            updateStatsUI();

            document.getElementById('game-board').innerHTML = '';
            document.getElementById('keyboard').innerHTML = '';

            hideGameOverPanel();

            document.getElementById('game-subtitle').textContent = `Βρες την λέξη με τα ${len} γράμματα!`;

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');

            try {
                await loadWordData();
            } catch (e) {
                alert(`Σφάλμα: ${e.message}`);
                gameOver = true;
                return;
            }

            targetWord = targetWords[Math.floor(Math.random() * targetWords.length)];
            sessionWords.push(targetWord);

            createBoard();
            createKeyboard();

            // Size cells after layout
            requestAnimationFrame(() => {
                applyCellSizes();
            });

            currentGuess = targetWord.charAt(0);
            updateBoard();

            startTimer();

            document.addEventListener('keydown', handlePhysicalKeyboard);
        }

        // Re-size on window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (document.getElementById('game-screen').classList.contains('active')) {
                    applyCellSizes();
                }
            }, 100);
        });

        function createBoard() {
            const board = document.getElementById('game-board');
            for (let i = 0; i < maxGuesses; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.id = `row-${i}`;
                for (let j = 0; j < wordLength; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${i}-${j}`;
                    row.appendChild(cell);
                }
                board.appendChild(row);
            }
        }

        function createKeyboard() {
            const keyboardLayout = [
                ['Ε', 'Ρ', 'Τ', 'Υ', 'Θ', 'Ι', 'Ο', 'Π'],
                ['Α', 'Σ', 'Δ', 'Φ', 'Γ', 'Η', 'Ξ', 'Κ', 'Λ'],
                ['DEL', 'Ζ', 'Χ', 'Ψ', 'Ω', 'Β', 'Ν', 'Μ']
            ];
            const keyboard = document.getElementById('keyboard');
            keyboardLayout.forEach(rowKeys => {
                const row = document.createElement('div');
                row.className = 'key-row';
                rowKeys.forEach(key => {
                    const btn = document.createElement('button');
                    btn.textContent = key;
                    btn.className = 'key';
                    if (key === 'DEL') btn.classList.add('wide');
                    btn.id = `key-${key}`;
                    btn.onclick = () => handleInput(key);
                    row.appendChild(btn);
                });
                keyboard.appendChild(row);
            });
        }

        function handlePhysicalKeyboard(e) {
            if (gameOver) return;
            const key = e.key.toUpperCase();
            if (key === 'BACKSPACE' || key === 'DELETE') { handleInput('DEL'); return; }
            if (/^[Α-Ω]$/.test(key)) { handleInput(key); }
            const enToGr = {
                'A':'Α','B':'Β','G':'Γ','D':'Δ','E':'Ε','Z':'Ζ','H':'Η','U':'Θ','I':'Ι','K':'Κ',
                'L':'Λ','M':'Μ','N':'Ν','X':'Ξ','O':'Ο','P':'Π','R':'Ρ','S':'Σ','T':'Τ','Y':'Υ',
                'F':'Φ','C':'Χ','V':'Ω','W':'ς'
            };
            if (enToGr[key]) { handleInput(enToGr[key]); }
        }

        function handleInput(key) {
            if (gameOver) return;
            if (key === 'DEL') {
                if (currentGuess.length > 1) { currentGuess = currentGuess.slice(0, -1); updateBoard(); }
                return;
            }
            if (currentGuess.length < wordLength) {
                currentGuess += key;
                updateBoard();
                if (currentGuess.length === wordLength) { setTimeout(() => checkWord(), 100); }
            }
        }

        function updateBoard() {
            const row = document.getElementById(`row-${currentRow}`);
            if (!row) return;
            const cells = row.querySelectorAll('.cell');
            cells.forEach(cell => { cell.textContent = ''; cell.style.borderColor = "var(--tile-border)"; });
            for (let i = 0; i < currentGuess.length; i++) {
                cells[i].textContent = currentGuess[i];
                cells[i].style.borderColor = "rgba(255,255,255,0.9)";
            }
        }

        function handleLoss(reason) {
            gameOver = true;
            clearTimer();
            showGameOverPanel(targetWord);
            stats.losses += 1;
            saveStats();
            updateStatsUI();
        }

        function checkWord() {
            if (currentGuess.length !== wordLength) return;

            // Check if word was already guessed before
            if (guessedWords.includes(currentGuess)) {
                handleLoss(`"${currentGuess}" την ξαναδοκίμασες! Έχασες!`);
                return;
            }

            if (!dictionary.includes(currentGuess)) {
                handleLoss(`"${currentGuess}" δεν υπάρχει στο λεξικό! Έχασες!`);
                return;
            }

            // Track this guess
            guessedWords.push(currentGuess);

            applyColors();
            if (currentGuess === targetWord) {
                clearTimer();
                gameOver = true;
                stats.wins += 1;
                saveStats();
                updateStatsUI();
                // Show green tiles first, then panel after 2 seconds
                setTimeout(() => {
                    showGameOverPanel(targetWord);
                }, 2000);
                return;
            }
            currentRow++;
            if (currentRow >= maxGuesses) {
                handleLoss(`Game Over! Η λέξη ήταν ${targetWord}`);
            } else {
                currentGuess = targetWord.charAt(0);
                updateBoard();
                startTimer();
            }
        }

        function applyColors() {
            const row = document.getElementById(`row-${currentRow}`);
            const cells = row.querySelectorAll('.cell');
            let targetChars = targetWord.split('');
            let guessChars = currentGuess.split('');
            let colors = new Array(wordLength).fill('absent');
            for (let i = 0; i < wordLength; i++) {
                if (guessChars[i] === targetChars[i]) { colors[i] = 'correct'; targetChars[i] = null; }
            }
            for (let i = 0; i < wordLength; i++) {
                if (colors[i] === 'correct') continue;
                const targetIndex = targetChars.indexOf(guessChars[i]);
                if (targetIndex !== -1) { colors[i] = 'present'; targetChars[targetIndex] = null; }
            }
            for (let i = 0; i < wordLength; i++) {
                setTimeout(() => {
                    cells[i].classList.add(colors[i]);
                    cells[i].style.borderColor = `var(--${colors[i]})`;
                    cells[i].style.color = "white";
                    updateKeyboardColor(guessChars[i], colors[i]);
                }, i * 120);
            }
        }

        function updateKeyboardColor(keyChar, colorStatus) {
            const keyBtn = document.getElementById(`key-${keyChar}`);
            if (!keyBtn) return;
            if (keyBtn.classList.contains('correct')) return;
            if (colorStatus === 'correct') { keyBtn.classList.remove('present', 'absent'); keyBtn.classList.add('correct'); }
            else if (colorStatus === 'present' && !keyBtn.classList.contains('correct')) { keyBtn.classList.remove('absent'); keyBtn.classList.add('present'); }
            else if (colorStatus === 'absent' && !keyBtn.classList.contains('correct') && !keyBtn.classList.contains('present')) { keyBtn.classList.add('absent'); }
        }

        // ---- Init ----
        loadStats();
        updateStatsUI();
    </script>
</body>
</html>
